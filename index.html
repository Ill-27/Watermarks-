<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artanat | Matrix Watermark</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            /* Абсолютно черный фон */
            background-color: #000;
            /* Скрываем скроллбары, чтобы ничего не мешало */
            overflow: hidden; 
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="watermark-canvas"></canvas>

    <script>
        const canvas = document.getElementById('watermark-canvas');
        const ctx = canvas.getContext('2d');
        
        // Твои коды-водяные знаки
        const words = ["artanat.com", "Artanat", "artanat", "Dante Sogliano", "Arterrii", "arterrii"];
        let drops = [];

        function initDrops() {
            drops = [];
            // Плотность колонок (ближе друг к другу на телефонах)
            const spacing = window.innerWidth < 768 ? 60 : 90; 
            const columns = Math.floor(window.innerWidth / spacing);

            for (let i = 0; i < columns; i++) {
                drops.push({
                    x: (i * spacing) + Math.random() * 20,
                    y: Math.random() * -1500, // Начинают падать с разной высоты за экраном
                    speed: 0.8 + Math.random() * 1.5,
                    word: words[Math.floor(Math.random() * words.length)],
                    opacity: 0.15 + Math.random() * 0.15, // Полупрозрачные (от 15% до 30%)
                    size: 12 + Math.random() * 6 // Разный размер для эффекта глубины
                });
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initDrops();
        }

        // Пересчитываем канвас при изменении размера окна
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            // Очищаем экран каждый кадр, чтобы фон оставался идеально черным
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < drops.length; i++) {
                const drop = drops[i];
                ctx.font = `${drop.size}px 'Fira Code', monospace`;
                ctx.fillStyle = `rgba(255, 255, 255, ${drop.opacity})`;
                ctx.fillText(drop.word, drop.x, drop.y);
                
                drop.y += drop.speed;

                // Если слово ушло вниз за экран — возвращаем его наверх с новым значением
                if (drop.y > canvas.height + 50) {
                    drop.y = -50;
                    drop.x = Math.random() * canvas.width;
                    drop.word = words[Math.floor(Math.random() * words.length)];
                }
            }
            requestAnimationFrame(draw);
        }
        
        draw();
    </script>
</body>
</html>
